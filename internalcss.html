<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal CSS Example</title>
    
    <style>
        body {
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #333333;
            text-align: center;
        }

        .highlight {
            color: #ff5722;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>This is a normal paragraph, but <span class="highlight">this text stands out</span> because of our internal styles.</p>

</body>
</html>
</body>
</html>
